name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate XML files
        run: |
          echo "Validating XML files..."
          find src -name "*.xml" -exec xmllint --noout {} \;
          echo "All XML files are valid."

      - name: Lint PHP files
        run: |
          echo "Checking PHP syntax..."
          find src -name "*.php" -exec php -l {} \;
          echo "All PHP files are valid."

      - name: Validate shell scripts
        run: |
          echo "Checking shell scripts..."
          find src -name "*.sh" -exec sh -n {} \;
          echo "All shell scripts are valid."

      - name: Check file structure
        run: |
          echo "Checking required files..."
          test -f Makefile || { echo "Missing Makefile"; exit 1; }
          test -f pkg-descr || { echo "Missing pkg-descr"; exit 1; }
          test -f LICENSE || { echo "Missing LICENSE"; exit 1; }
          test -d src/opnsense/mvc/app/models/OPNsense/Zapret || { echo "Missing model directory"; exit 1; }
          test -d src/opnsense/mvc/app/controllers/OPNsense/Zapret || { echo "Missing controller directory"; exit 1; }
          test -d src/opnsense/mvc/app/views/OPNsense/Zapret || { echo "Missing views directory"; exit 1; }
          test -d src/opnsense/service/conf/actions.d || { echo "Missing actions directory"; exit 1; }
          test -d src/opnsense/scripts/OPNsense/Zapret || { echo "Missing scripts directory"; exit 1; }
          echo "File structure OK."

  package:
    name: Build Package
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'PLUGIN_VERSION=' Makefile | head -1 | sed 's/.*=\s*//')
          REVISION=$(grep 'PLUGIN_REVISION=' Makefile | head -1 | sed 's/.*=\s*//')
          if [ -n "$REVISION" ] && [ "$REVISION" != "0" ]; then
            FULL_VERSION="${VERSION}_${REVISION}"
          else
            FULL_VERSION="${VERSION}"
          fi
          echo "version=${FULL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Package version: ${FULL_VERSION}"

      - name: Build package
        run: |
          PKG_NAME="os-zapret2-${{ steps.version.outputs.version }}"
          echo "Building ${PKG_NAME}.pkg..."

          # Create staging directory with OPNsense paths
          mkdir -p staging/usr/local
          cp -r src/opnsense staging/usr/local/opnsense

          # Ensure scripts are executable
          find staging -name "*.sh" -exec chmod +x {} \;
          find staging -name "zapret" -path "*/rc.d/*" -exec chmod +x {} \;

          # Create .pkg (tar.xz)
          cd staging
          tar -cJf "../${PKG_NAME}.pkg" .
          cd ..

          echo "Package built: ${PKG_NAME}.pkg"
          ls -lh "${PKG_NAME}.pkg"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: os-zapret2-${{ steps.version.outputs.version }}
          path: "*.pkg"
