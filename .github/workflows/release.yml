name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate XML files
        run: find src -name "*.xml" -exec xmllint --noout {} \;

      - name: Lint PHP files (docker)
        run: |
          docker run --rm -v "${PWD}":/app -w /app php:8.2-cli sh -c '
            set -e
            find src -name "*.php" -exec php -l {} \;
            find src -name "*.inc" -exec php -l {} \;
          '

      - name: Validate shell scripts
        run: |
          find src -name "*.sh" -exec sh -n {} \;
          find pkg -type f -exec sh -n {} \;
          find scripts -name "*.sh" -exec sh -n {} \;

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Extract versions
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          # The pkg filename uses the Makefile's PLUGIN_VERSION (which may
          # differ from the tag, e.g. tag v1.6.0 vs Makefile 1.6 → pkg name
          # `os-zapret2-1.6.pkg`). Extract both so the release-notes URL
          # matches the actual asset name.
          PKG=$(grep '^PLUGIN_VERSION=' Makefile | head -1 | sed 's/.*=\s*//')
          REV=$(grep '^PLUGIN_REVISION=' Makefile | head -1 | sed 's/.*=\s*//')
          if [ -n "$REV" ] && [ "$REV" != "0" ]; then
            PKG="${PKG}_${REV}"
          fi
          echo "tag_version=${TAG}" >> "$GITHUB_OUTPUT"
          echo "pkg_version=${PKG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: v${TAG} | pkg: os-zapret2-${PKG}.pkg"

      - name: Build .pkg inside FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          usesh: true
          prepare: |
            pkg install -y jq
          run: |
            sh scripts/build-pkg.sh

      - name: Stage built package for release upload
        run: |
          ls -lh dist/
          # Move to repo root so softprops/action-gh-release picks it up
          mv dist/*.pkg .
          ls -lh *.pkg

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" | grep -v "Co-Authored-By")
          else
            CHANGES=$(git log --pretty=format:"- %s" | grep -v "Co-Authored-By")
          fi
          cat > /tmp/changelog.md << 'HEADER'
          ## Installation

          Install from SSH on the OPNsense firewall:

          ```sh
          fetch -o /tmp/os-zapret2.pkg https://github.com/ugorur/os-zapret2/releases/download/v${{ steps.version.outputs.tag_version }}/os-zapret2-${{ steps.version.outputs.pkg_version }}.pkg
          pkg add /tmp/os-zapret2.pkg

          # Download and compile the dvtws2 binary
          /usr/local/opnsense/scripts/OPNsense/Zapret/setup.sh
          ```

          The plugin will then appear under **Firmware > Plugins** (as `os-zapret2`)
          and **System > Services** (as `zapret2 DPI Bypass`). Configure it via
          **Services > Zapret DPI Bypass** in the GUI. It will auto-start on
          every reboot while "Enabled" is checked.

          To uninstall: `pkg delete os-zapret2`

          ### Requirements
          - OPNsense 26.1+ (FreeBSD 14.x)
          - `luajit` package (declared as a pkg dependency, installed automatically)
          - `git` (required by setup.sh to fetch and compile zapret2 sources)

          HEADER

          echo "" >> /tmp/changelog.md
          echo "## Changes" >> /tmp/changelog.md
          echo "$CHANGES" >> /tmp/changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.pkg"
          body_path: /tmp/changelog.md
          draft: false
          prerelease: false
          generate_release_notes: false
