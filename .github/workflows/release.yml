name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate XML files
        run: find src -name "*.xml" -exec xmllint --noout {} \;

      - name: Lint PHP files
        run: find src -name "*.php" -exec php -l {} \;

      - name: Validate shell scripts
        run: find src -name "*.sh" -exec sh -n {} \;

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "tag_version=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${TAG}"

      - name: Build package
        run: |
          PKG_NAME="os-zapret2-${{ steps.version.outputs.tag_version }}"

          mkdir -p staging/usr/local
          cp -r src/opnsense staging/usr/local/opnsense

          find staging -name "*.sh" -exec chmod +x {} \;
          find staging -name "zapret" -path "*/rc.d/*" -exec chmod +x {} \;

          cd staging
          tar -cJf "../${PKG_NAME}.pkg" .
          cd ..

          ls -lh "${PKG_NAME}.pkg"

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" | grep -v "Co-Authored-By")
          else
            CHANGES=$(git log --pretty=format:"- %s" | grep -v "Co-Authored-By")
          fi
          # Write to file for the release body
          cat > /tmp/changelog.md << 'HEADER'
          ## Installation

          ### Quick Install (SSH)
          ```sh
          # Download and extract
          fetch -o /tmp/os-zapret2.pkg https://github.com/ugorur/os-zapret2/releases/latest/download/os-zapret2-${{ steps.version.outputs.tag_version }}.pkg
          cd /tmp && tar -xJf os-zapret2.pkg -C /usr/local

          # Set permissions
          chmod +x /usr/local/opnsense/scripts/OPNsense/Zapret/*.sh
          chmod +x /usr/local/opnsense/scripts/OPNsense/Zapret/rc.d/zapret

          # Download and compile zapret2
          /usr/local/opnsense/scripts/OPNsense/Zapret/setup.sh

          # Restart configd to register the plugin
          service configd restart
          ```

          Then navigate to **Services > Zapret DPI Bypass** in the OPNsense GUI.

          ### Requirements
          - OPNsense 26.1+ (FreeBSD 14.x)
          - `luajit` and `git` packages (installed automatically by setup.sh)

          HEADER

          echo "" >> /tmp/changelog.md
          echo "## Changes" >> /tmp/changelog.md
          echo "$CHANGES" >> /tmp/changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.pkg"
          body_path: /tmp/changelog.md
          draft: false
          prerelease: false
          generate_release_notes: false
